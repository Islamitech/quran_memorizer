<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definition of gradients and filters -->
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Square App Frame -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="6" />
  
  <!-- Islamic Arch/Glow Frame -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold-grad)" stroke-width="4" opacity="0.4" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#emerald-grad)" stroke-width="2" stroke-dasharray="10 5" opacity="0.6" />
  
  <!-- Central Glowing Aura -->
  <circle cx="256" cy="256" r="100" fill="#10b981" opacity="0.15" filter="url(#glow)" />
  
  <!-- Book Stand (Rehal) -->
  <path d="M180 340 L332 340 L360 380 L152 380 Z" fill="url(#gold-grad)" opacity="0.9" />
  <path d="M210 340 L302 340 L310 355 L202 355 Z" fill="#78350f" />
  <path d="M152 380 L256 340 L360 380 L256 420 Z" fill="url(#gold-grad)" />

  <!-- Open Quran Book Pages -->
  <!-- Left Page -->
  <path d="M256 320 C210 320 160 300 130 240 C160 210 210 200 256 210 Z" fill="#f8fafc" stroke="url(#gold-grad)" stroke-width="3" />
  <!-- Right Page -->
  <path d="M256 320 C302 320 352 300 382 240 C352 210 302 200 256 210 Z" fill="#f8fafc" stroke="url(#gold-grad)" stroke-width="3" />
  
  <!-- Page Lines (Quranic text representations) -->
  <path d="M160 250 H240 M150 270 H235 M145 290 H230" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
  <path d="M352 250 H272 M362 270 H277 M367 290 H282" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />

  <!-- Quran Central Emblem (Islamic Star / Mandala) -->
  <g transform="translate(256, 200) scale(1.4)" filter="url(#glow)">
    <!-- 8-Pointed Star -->
    <path d="M-20 0 L-14 -14 L0 -20 L14 -14 L20 0 L14 14 L0 20 L-14 14 Z" fill="url(#emerald-grad)" />
    <path d="M-14 -14 L0 -20 L14 -14 L20 0 L14 14 L0 20 L-14 14 L-20 0 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <circle cx="0" cy="0" r="8" fill="url(#gold-grad)" />
  </g>

  <!-- Glowing Sparkles / Blessings -->
  <circle cx="120" cy="150" r="4" fill="#fbbf24" filter="url(#glow)" />
  <circle cx="392" cy="150" r="6" fill="#fbbf24" filter="url(#glow)" />
  <circle cx="256" cy="90" r="5" fill="#34d399" filter="url(#glow)" />
  <circle cx="180" cy="110" r="3" fill="#fff" />
  <circle cx="330" cy="110" r="3" fill="#fff" />
</svg>
