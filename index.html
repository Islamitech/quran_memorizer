<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>محفّظ القرآن | Minimalist</title>
  <meta name="description" content="تطبيق ويب تقدمي لحفظ القرآن الكريم بتجربة عصرية بسيطة">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/components.css">
</head>
<body class="theme-light">
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
        <h1>محفّظ</h1>
      </div>
      <div class="header-controls">
        <button id="btn-switch-role" class="icon-btn" aria-label="تبديل الحساب">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </button>
        <button id="btn-tour" class="icon-btn" aria-label="مساعدة">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </button>
        <button id="btn-install" class="icon-btn" aria-label="تنزيل التطبيق" style="display: none; color: var(--accent-success); gap: 6px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--accent-success);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          <span style="font-size: 0.85rem; font-weight: bold;">تثبيت</span>
        </button>
        <button id="btn-echo" class="icon-btn" aria-label="صدى المسجد">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line><path d="M4 22h16"></path></svg>
        </button>
        <button id="btn-listening" class="icon-btn" aria-label="وضع الاستماع">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
        </button>
        <button id="btn-child-mode" class="icon-btn" aria-label="وضع الأطفال">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
        </button>
        <div class="progress-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          <span id="stat-mastered">0%</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      <!-- Selectors Card -->
      <section class="selectors-card">
        <div class="custom-select-wrapper">
          <select id="reciter-select" aria-label="اختر القارئ"></select>
          <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="custom-select-wrapper">
          <input type="text" id="surah-input" list="surah-list" placeholder="ابحث عن سورة..." aria-label="ابحث عن سورة">
          <datalist id="surah-list"></datalist>
          <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <div class="custom-select-wrapper">
          <select id="ayah-select" aria-label="اختر الآية"></select>
          <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </section>

      <!-- Quran Display Card -->
      <section class="quran-card" id="quran-container">
        <div class="ayah-wrapper">
          <div id="focused-ayah-title" style="display:none; text-align: center; font-family: var(--font-ui); font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px;"></div>
          <div id="basmalah-container" class="basmalah-container" style="display:none;">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
          <p class="ayah-container" id="current-ayah-display">
            <!-- Ayah words will be rendered here -->
          </p>
          <div id="tafsir-display" style="display:none; font-family: var(--font-ui); font-size: 1.1rem; color: var(--text-secondary); margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border-color); line-height: 1.8;"></div>
          <div id="translation-display" style="display:none; font-family: 'Inter', sans-serif; font-size: 1rem; color: var(--text-secondary); margin-top: 16px; direction: ltr; text-align: left; padding-top: 16px; border-top: 1px dashed var(--border-color); line-height: 1.6;"></div>
        </div>
      </section>
      
      <!-- Speech Result -->
      <div class="speech-result-container">
        <div id="speech-status" class="speech-status"></div>
        <div id="speech-result" class="speech-result"></div>
        <button id="btn-send-teacher" class="send-teacher-btn" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 6px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          إرسال للمعلم
        </button>
      </div>
    </main>

    <!-- Bottom Navigation App Bar -->
    <nav class="bottom-nav">
      
      <!-- Timeline (Absolute above nav) -->
      <div class="player-timeline" id="player-container">
        <audio id="audio-player"></audio>
        <span id="time-current" class="time-text">00:00</span>
        <div class="slider-wrapper">
          <input type="range" id="progress-slider" min="0" max="100" value="0">
          <div class="slider-progress" id="slider-progress"></div>
        </div>
        <span id="time-total" class="time-text">00:00</span>
      </div>

      <!-- Controls Row -->
      <div class="nav-controls">
        <div class="player-buttons">
          <button id="btn-next" class="nav-icon-btn" aria-label="التالي">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
          </button>
          
          <button id="btn-play-pause" class="nav-icon-btn play-btn" aria-label="تشغيل">
            <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
          </button>
          
          <button id="btn-prev" class="nav-icon-btn" aria-label="السابق">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
          </button>

          <button id="btn-repeat" class="nav-icon-btn" aria-label="تكرار الآية">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
          </button>
        </div>

        <!-- View Toggles (Quran/Tafsir/Translation) -->
        <div class="view-toggles" style="display: flex; gap: 8px;">
          <button id="btn-view-quran" class="view-btn active" aria-label="قرآن">قرآن</button>
          <button id="btn-view-tafsir" class="view-btn" aria-label="تفسير">تفسير</button>
          <button id="btn-view-translation" class="view-btn" aria-label="ترجمة">ترجمة</button>
        </div>

        <!-- Mic Control Group -->
        <div class="mic-control-group" style="display: flex; align-items: center; gap: 12px;">
          <!-- Play Recording Button -->
          <button id="btn-play-recording" class="nav-icon-btn" aria-label="استمع لتسجيلك" disabled style="opacity: 0.5;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          </button>
          
          <!-- Mic Button -->
          <button id="btn-mic" class="mic-btn-minimal" aria-label="تسميع">
            <svg class="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
          </button>
        </div>
      </div>

    </nav>
  </div>

  <div id="modal-overlay" class="modal-overlay"></div>
  
  <!-- Teacher Dashboard Modal -->
  <div id="teacher-dashboard-modal" class="modal-card" style="display: none;">
    <div class="modal-header">
      <h2>لوحة المعلم زكي</h2>
      <button id="btn-close-teacher" class="icon-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="modal-body">
      <h3>التسميعات المرسلة حديثاً</h3>
      <div id="teacher-reports-list" class="reports-list">
        <!-- Reports will be populated here -->
      </div>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
